<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Define gradients -->
  <defs>
    <linearGradient id="saffronGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9933;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFB84D;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#138808;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1FAA1F;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="chakraGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#000088;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#000066;stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="95" fill="#1a1a1a" stroke="#333" stroke-width="2"/>
  
  <!-- Saffron Band (Top) -->
  <path d="M 20 70 Q 100 50 180 70 L 180 85 Q 100 65 20 85 Z" fill="url(#saffronGradient)"/>
  
  <!-- White Band (Middle) -->
  <path d="M 20 85 Q 100 65 180 85 L 180 100 Q 100 80 20 100 Z" fill="#FFFFFF"/>
  
  <!-- Green Band (Bottom) -->
  <path d="M 20 100 Q 100 80 180 100 L 180 115 Q 100 95 20 115 Z" fill="url(#greenGradient)"/>
  
  <!-- Ashoka Chakra (Blue Wheel) -->
  <circle cx="100" cy="87.5" r="12" fill="none" stroke="url(#chakraGradient)" stroke-width="2"/>
  <circle cx="100" cy="87.5" r="3" fill="url(#chakraGradient)"/>
  
  <!-- Chakra Spokes -->
  <g stroke="url(#chakraGradient)" stroke-width="1">
    <line x1="100" y1="75.5" x2="100" y2="99.5"/>
    <line x1="100" y1="75.5" x2="100" y2="99.5" transform="rotate(15 100 87.5)"/>
    <line x1="100" y1="75.5" x2="100" y2="99.5" transform="rotate(30 100 87.5)"/>
    <line x1="100" y1="75.5" x2="100" y2="99.5" transform="rotate(45 100 87.5)"/>
    <line x1="100" y1="75.5" x2="100" y2="99.5" transform="rotate(60 100 87.5)"/>
    <line x1="100" y1="75.5" x2="100" y2="99.5" transform="rotate(75 100 87.5)"/>
    <line x1="100" y1="75.5" x2="100" y2="99.5" transform="rotate(90 100 87.5)"/>
    <line x1="100" y1="75.5" x2="100" y2="99.5" transform="rotate(105 100 87.5)"/>
    <line x1="100" y1="75.5" x2="100" y2="99.5" transform="rotate(120 100 87.5)"/>
    <line x1="100" y1="75.5" x2="100" y2="99.5" transform="rotate(135 100 87.5)"/>
    <line x1="100" y1="75.5" x2="100" y2="99.5" transform="rotate(150 100 87.5)"/>
    <line x1="100" y1="75.5" x2="100" y2="99.5" transform="rotate(165 100 87.5)"/>
  </g>
  
  <!-- Musical Note Symbol -->
  <text x="100" y="145" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="#FF9933" text-anchor="middle">♪</text>
  
  <!-- Text "MelodyMixx India" -->
  <text x="100" y="175" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#FFFFFF" text-anchor="middle" letter-spacing="1">MELODYMIXX INDIA</text>
</svg>
